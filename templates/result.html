<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Result</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-black via-slate-900 to-black flex items-center justify-center p-6">

<div class="max-w-xl w-full bg-gray-900/80 backdrop-blur-lg border border-red-900 rounded-3xl p-10 text-center">

    {% if passed %}

    <div class="text-6xl mb-6">🏆</div>

    <h1 class="text-4xl font-bold text-green-400 mb-4">
        Congratulations!
    </h1>

    <p class="text-gray-300 mb-6">
        You have successfully passed the quiz.
    </p>

    {% else %}

    <div class="text-6xl mb-6">📋</div>

    <h1 class="text-4xl font-bold text-red-400 mb-4">
        Quiz Completed
    </h1>

    <p class="text-gray-300 mb-6">
        You did not achieve the required passing score of 60%.
    </p>

    {% endif %}

    <div class="bg-gray-800 rounded-2xl p-6 mb-6">

        <div class="text-gray-400 mb-2">
            Score
        </div>

        <div class="text-3xl font-bold text-white">
            {{ score }}
        </div>

        <div class="mt-4 text-gray-400">
            Percentage
        </div>

        <div class="text-3xl font-bold text-white">
            {{ percentage }}%
        </div>

    </div>

    <a href="/quizzes"
       class="inline-block bg-red-700 hover:bg-red-600 text-white px-8 py-3 rounded-xl transition">
        Take Another Quiz
    </a>

</div>

</body>
</html>
